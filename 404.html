<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (e) {}
  })();
</script>
<title>Page not found — Uttam Sangani</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e0446b'/%3E%3Ctext x='32' y='44' font-family='Arial,sans-serif' font-size='34' font-weight='700' fill='white' text-anchor='middle'%3EU%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f7f6f3;--ink:#16141a;--ink-soft:#524e58;--rose:#e0446b;--line:#e5e1d9}
  :root[data-theme="dark"]{--paper:#14121b;--ink:#f3f0f7;--ink-soft:#a9a3b8;--line:#2a2536}
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
    font-family:"Instrument Sans",system-ui,sans-serif;background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;position:relative;overflow:hidden;
  }
  body::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(50% 45% at 50% 30%,rgba(224,68,107,.14),transparent 70%);
  }
  .box{position:relative;z-index:1;max-width:460px}
  .code{
    font-family:"JetBrains Mono",monospace;font-size:14px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--rose);margin-bottom:18px;
  }
  h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(56px,14vw,96px);line-height:1;letter-spacing:-.02em;margin-bottom:16px}
  p{color:var(--ink-soft);font-size:17px;margin-bottom:30px}
  a{
    display:inline-flex;align-items:center;gap:9px;text-decoration:none;
    font-weight:600;font-size:15px;color:#fff;background:var(--rose);
    padding:13px 24px;border-radius:999px;box-shadow:0 6px 18px rgba(224,68,107,.28);
    transition:transform .18s ease;
  }
  a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <p class="code">Error 404</p>
    <h1>Lost the thread.</h1>
    <p>That page doesn't exist — but the good stuff is one click away.</p>
    <a href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      Back to home
    </a>
  </div>
</body>
</html>
